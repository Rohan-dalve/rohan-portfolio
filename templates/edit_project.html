{% extends "base.html" %}

{% block title %}Edit Project | {{ site.name }}{% endblock %}
{% block body_class %}admin-body{% endblock %}

{% block content %}
<section class="section">
    <div class="container form-page">
        <div class="panel-header reveal">
            <div>
                <span class="section-tag">Projects</span>
                <h1>Edit Project</h1>
            </div>
            <a class="btn btn-secondary" href="{{ url_for('dashboard') }}">Back to Dashboard</a>
        </div>

        <article class="glass admin-panel reveal">
            <form class="admin-form" action="{{ url_for('edit_project', project_id=project.id) }}" method="post" enctype="multipart/form-data">
                <label>
                    Project Title
                    <input type="text" name="title" value="{{ project.title }}" required>
                </label>
                <label>
                    Description
                    <textarea name="description" rows="4" required>{{ project.description }}</textarea>
                </label>
                <label>
                    Tech Stack
                    <input type="text" name="tech_stack" value="{{ project.tech_stack }}" required>
                </label>
                <label>
                    Problem Statement
                    <textarea name="problem_statement" rows="4" required>{{ project.problem_statement or '' }}</textarea>
                </label>
                <label>
                    Approach / Solution
                    <textarea name="approach" rows="4" required>{{ project.approach or '' }}</textarea>
                </label>
                <label>
                    Key Results / Impact
                    <textarea name="impact" rows="4" required>{{ project.impact or '' }}</textarea>
                </label>
                <label>
                    GitHub Link
                    <input type="url" name="github_link" value="{{ project.github_link or '' }}">
                </label>
                <label>
                    Replace Project Image
                    <input type="file" name="image" accept=".png,.jpg,.jpeg,.webp,.gif">
                </label>

                {% if project.image %}
                <div class="current-image-preview">
                    <p>Current Image</p>
                    <img src="{{ url_for('static', filename=project.image) }}" alt="{{ project.title }}">
                </div>
                {% endif %}

                <button class="btn btn-primary" type="submit">Save Changes</button>
            </form>
        </article>
    </div>
</section>
{% endblock %}
