{% extends "base.html" %}

{% block title %}Add Experience | {{ site.name }}{% endblock %}
{% block body_class %}admin-body{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="panel-header">
            <div>
                <span class="section-tag">Experience</span>
                <h2>Add Experience</h2>
            </div>
            <a class="btn" href="{{ url_for('experiences_manager') }}">Back to list</a>
        </div>

        <form class="admin-form" action="{{ url_for('add_experience') }}" method="post">
            <label>Job Title<input type="text" name="job_title" required></label>
            <label>Company Name<input type="text" name="company_name" required></label>
            <label>Employment Type<input type="text" name="employment_type"></label>
            <label>Start Date<input type="date" name="start_date"></label>
            <label>End Date<input type="date" name="end_date"></label>
            <label><input type="checkbox" name="current_job"> Currently Working</label>
            <label>Location<input type="text" name="location"></label>
            <label>Description<textarea name="description" rows="4"></textarea></label>
            <label>Key Responsibilities<textarea name="responsibilities" rows="3"></textarea></label>
            <label>Technologies Used<input type="text" name="technologies" placeholder="Comma separated"></label>
            <label>Display Order<input type="number" name="display_order" value="0"></label>
            <label><input type="checkbox" name="status" checked> Active</label>
            <button class="btn btn-primary" type="submit">Add Experience</button>
        </form>
    </div>
</section>
{% endblock %}
