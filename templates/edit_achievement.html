{% extends "base.html" %}

{% block title %}Edit Achievement | {{ site.name }}{% endblock %}
{% block body_class %}admin-body{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="panel-header">
            <div>
                <span class="section-tag">Achievements</span>
                <h2>Edit Achievement</h2>
            </div>
            <a class="btn" href="{{ url_for('achievements_manager') }}">Back to list</a>
        </div>

        <form class="admin-form" action="{{ url_for('edit_achievement', ach_id=ach.id) }}" method="post" enctype="multipart/form-data">
            <label>Achievement Title<input type="text" name="title" value="{{ ach.title }}" required></label>
            <label>Organization/Event<input type="text" name="organization" value="{{ ach.organization }}"></label>
            <label>Date<input type="date" name="achievement_date" value="{{ ach.achievement_date }}"></label>
            <label>Achievement Image<input type="file" name="image" accept=".png,.jpg,.jpeg,.webp,.gif"></label>
            <div class="current-image-preview">
                {% if ach.image %}
                <img src="{{ url_for('static', filename=ach.image) }}" alt="Current achievement">
                {% endif %}
            </div>
            <label>Description<textarea name="description" rows="3">{{ ach.description }}</textarea></label>
            <label>Display Order<input type="number" name="display_order" value="{{ ach.display_order }}"></label>
            <label><input type="checkbox" name="status" {% if ach.status %}checked{% endif %}> Active</label>
            <button class="btn btn-primary" type="submit">Save Changes</button>
        </form>
    </div>
</section>
{% endblock %}
