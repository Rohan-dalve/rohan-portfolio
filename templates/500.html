{% extends "base.html" %}

{% block title %}Server Error | {{ site.name }}{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="glass error-card">
            <span class="section-tag">500</span>
            <h1>Something went wrong</h1>
            <p>We are unable to process this request right now. Please try again shortly.</p>
            <a class="btn btn-primary" href="{{ url_for('home') }}">Return home</a>
        </div>
    </div>
</section>
{% endblock %}
