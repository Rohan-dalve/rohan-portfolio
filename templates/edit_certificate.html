{% extends "base.html" %}

{% block title %}Edit Certificate | {{ site.name }}{% endblock %}
{% block body_class %}admin-body{% endblock %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="panel-header">
            <div>
                <span class="section-tag">Certifications</span>
                <h2>Edit Certificate</h2>
            </div>
            <a class="btn" href="{{ url_for('certifications_manager') }}">Back to list</a>
        </div>

        <form class="admin-form" action="{{ url_for('edit_certification', cert_id=cert.id) }}" method="post" enctype="multipart/form-data">
            <label>Certificate Title<input type="text" name="title" value="{{ cert.title }}" required></label>
            <label>Issuing Organization<input type="text" name="issuer" value="{{ cert.issuer }}"></label>
            <label>Issue Date<input type="date" name="issue_date" value="{{ cert.issue_date }}"></label>
            <label>Credential ID<input type="text" name="credential_id" value="{{ cert.credential_id }}"></label>
            <label>Verification URL<input type="url" name="verification_url" value="{{ cert.verification_url }}"></label>
            <label>Category<input type="text" name="category" value="{{ cert.category }}"></label>
            <label>Certificate Image<input type="file" name="image" accept=".png,.jpg,.jpeg,.webp,.gif"></label>
            <div class="current-image-preview">
                {% if cert.image %}
                <img src="{{ url_for('static', filename=cert.image) }}" alt="Current certificate">
                {% endif %}
            </div>
            <label>Description<textarea name="description" rows="3">{{ cert.description }}</textarea></label>
            <label>Display Order<input type="number" name="display_order" value="{{ cert.display_order }}"></label>
            <label><input type="checkbox" name="status" {% if cert.status %}checked{% endif %}> Active</label>
            <button class="btn btn-primary" type="submit">Save Changes</button>
        </form>
    </div>
</section>
{% endblock %}
